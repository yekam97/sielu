<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sielu Admin - Gestión de Precios</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Login Modal -->
    <div id="loginModal"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--sielu-bg); display: flex; justify-content: center; align-items: center; z-index: 9999; display: none;">
        <div
            style="background: white; padding: 3rem; border-radius: var(--border-radius); box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%;">
            <h2
                style="font-family: var(--font-serif); font-size: 2rem; color: var(--sielu-text-dark); margin-bottom: 1.5rem;">
                Administración
            </h2>
            <input type="password" id="passwordInput" placeholder="Contraseña de acceso"
                style="width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 4px;">
            <button id="loginBtn" class="btn-primary" style="width: 100%;">Ingresar</button>
            <p id="errorMsg" style="color: red; margin-top: 1rem; display: none;">Contraseña incorrecta.</p>
        </div>
    </div>

    <header>
        <p class="title-pre">Panel de Administración</p>
        <img src="/logo.png" alt="Sielu Logo" class="logo-main">
    </header>

    <div class="admin-container">
        <h2 style="margin-bottom: 1.5rem; font-family: var(--font-serif);">Agregar / Editar Producto</h2>
        <form id="productForm">
            <input type="hidden" id="productId">

            <div class="form-group">
                <label for="cat">Categoría</label>
                <input type="text" id="cat" placeholder="Ej: BALAS PARA GU10" required>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label for="nombre">Nombre del Producto</label>
                    <input type="text" id="nombre" required>
                </div>
                <div class="form-group">
                    <label for="codigo">Código Facturación</label>
                    <input type="text" id="codigo" required>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label for="price">Precio antes de IVA</label>
                    <input type="number" id="price" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="img">URL de Imagen Principal</label>
                    <input type="text" id="img" placeholder="https://...">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label for="dibujo">URL Dibujo Técnico</label>
                    <input type="text" id="dibujo" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label for="imgContexto">URL Imagen en Contexto</label>
                    <input type="text" id="imgContexto" placeholder="https://...">
                </div>
            </div>

            <div class="form-group">
                <label for="especificaciones">Especificaciones Técnicas</label>
                <textarea id="especificaciones" rows="10"
                    placeholder="TIPO LÁMPARA: Spot&#10;MATERIAL: Aluminio&#10;POTENCIA: 3W Led (COB)&#10;FLUJO LUMINOSO: 46 LM/W&#10;TEMPERATURA DE COLOR: 3000K&#10;IRC: 80&#10;ÁNGULO DE APERTURA: 24°&#10;GRADO DE PROTECCIÓN (IP): 20&#10;DIMENSIONES: 150.0mm x 30.0mm&#10;ACABADO: Negro Mate&#10;GARANTÍA: 2 años"
                    style="width:100%; padding:0.8rem; border:1px solid #ddd; border-radius:4px; font-family: var(--font-sans); font-size:0.9rem; resize:vertical;"></textarea>
            </div>

            <div class="form-group">
                <label for="sheet">URL Ficha Técnica (PDF)</label>
                <input type="text" id="sheet" placeholder="https://...">
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <button type="submit" id="submitBtn" class="btn-primary" style="flex: 1;">Agregar Producto</button>
                <button type="button" id="cancelBtn" class="btn-primary"
                    style="background: #f44336; color: white; display: none;">Cancelar</button>
            </div>
        </form>
    </div>

    <div class="controls-container">
        <input type="text" id="searchInput" placeholder="Filtrar productos cargados...">
    </div>

    <div class="table-wrapper">
        <table id="adminTable">
            <thead>
                <tr>
                    <th>Imagen</th>
                    <th>Producto</th>
                    <th>Código</th>
                    <th>Orden</th>
                    <th>Precio</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <!-- Products will be injected here -->
            </tbody>
        </table>
    </div>

    <script type="module" src="admin.js"></script>
</body>

</html>
