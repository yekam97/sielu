<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Precios - Sielu</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>

<body class="home-page">
    <header class="catalog-header">
        <div class="header-left">
            <a href="index.html" class="brand-logo">sielu</a>
        </div>
        <div class="header-center">
            <nav class="header-nav">
                <a href="catalogo.html" class="nav-link">Catálogo</a>
                <a href="view.html" class="nav-link active">Lista de Precios</a>
            </nav>
        </div>
        <div class="header-right">
            <span class="header-volume">CATÁLOGO TÉCNICO VOL. 01</span>
        </div>
    </header>

    <main class="view-main">
        <!-- Section Label -->
        <div class="section-label-container">
            <p class="hero-label">LISTA DE PRECIOS</p>
            <div class="label-underline"></div>
        </div>

        <!-- Controls Bar -->
        <div class="controls-bar">
            <div class="search-wrapper">
                <i data-lucide="search"></i>
                <input type="text" id="searchInput" placeholder="Buscar por nombre, código o descripción...">
            </div>
            <div class="adjustment-wrapper">
                <span>Ajuste Global (%):</span>
                <input type="number" id="globalAdjustment" value="0" step="1">
            </div>
            <div class="export-actions">
                <button id="btnDownload" class="btn-tan">
                    <i data-lucide="download"></i>
                    Descargar PDF
                </button>
                <button id="btnDownloadNoPrices" class="btn-light-tan">
                    PDF Sin Precios
                </button>
            </div>
        </div>

        <!-- Price Table -->
        <div class="price-table-wrapper">
            <table id="priceTable">
                <thead>
                    <tr>
                        <th class="col-img">Imagen</th>
                        <th class="col-name">Nombre</th>
                        <th class="col-code">Facturación</th>
                        <th class="col-price">Precio Unitario</th>
                        <th class="col- ficha">Ficha</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 5rem;">Cargando productos...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Lucide Icons Script -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
    <script type="module" src="view.js"></script>
</body>

</html>
