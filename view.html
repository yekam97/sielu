<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Precios - Sielu</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <p class="title-pre">Lista de Precios</p>
        <img src="/logo.png" alt="Sielu Logo" class="logo-main" id="brandLogo">
    </header>

    <div class="controls-container">
        <input type="text" id="searchInput" placeholder="Buscar por nombre, código o descripción...">
        <div class="adjustment-box" style="display: flex; align-items: center; gap: 0.5rem;">
            <label style="font-size: 0.9rem; font-weight: 600;">Ajuste Global (%):</label>
            <input type="number" id="globalAdjustment" value="0" step="1"
                style="width: 70px; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        <button id="btnDownload" class="btn-primary">Descargar PDF</button>
    </div>

    <div class="table-wrapper">
        <table id="priceTable">
            <thead>
                <tr>
                    <th>Imagen</th>
                    <th>Nombre</th>
                    <th>Código Facturación</th>
                    <th>Precio antes de IVA</th>
                    <th>Ficha Técnica</th>
                </tr>
            </thead>
            <tbody>
                <!-- Products will be injected here -->
                <tr>
                    <td colspan="5" style="text-align: center; padding: 2rem;">Cargando productos...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script type="module" src="view.js"></script>
</body>

</html>
