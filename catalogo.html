<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Visual - Sielu</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="catalog-header">
        <div class="header-left">
            <a href="index.html" class="brand-logo">sielu</a>
        </div>
        <div class="header-center">
            <nav class="header-nav">
                <a href="catalogo.html" class="nav-link active">Catálogo</a>
                <a href="view.html" class="nav-link">Lista de Precios</a>
            </nav>
        </div>
        <div class="header-right">
            <span class="header-volume">CATÁLOGO TÉCNICO VOL. 01</span>
        </div>
    </header>

    <div class="controls-container" style="max-width: 1050px; margin: 2rem auto 1rem;">
        <a href="index.html" class="btn-primary" style="background: #eee; font-size: 0.9rem; padding: 0.6rem 1.2rem;">Volver al Inicio</a>
        <input type="text" id="searchInput" placeholder="Buscar en el catálogo..." style="max-width: 400px; padding: 0.6rem 1.2rem; border-radius: 50px;">
    </div>

    <!-- Category sticky navigation bar -->
    <div class="catalog-nav-wrapper">
        <nav class="catalog-nav" id="catalogNav">
            <!-- Dynamic category tabs will be injected here -->
        </nav>
    </div>

    <!-- Main catalog product list -->
    <main class="catalog-main" id="catalogMain">
        <div id="catalogContainer">
            <div class="loading-catalog">Cargando catálogo visual...</div>
        </div>
    </main>

    <script type="module" src="catalogo.js"></script>
</body>

</html>
